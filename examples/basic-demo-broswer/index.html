<!DOCTYPE html>
<!--
  demo.html

  A clickable demo page, meant to be opened directly in a browser with
  no setup. It shows two PeerBasket use cases side by side, switchable
  with two buttons:

    - "Open lobby"  : connects to everyone currently in the basket
                      (same idea as basic-connect.html).
    - "Find a match": connects to exactly ONE other peer and then stops
                      polling, a minimal version of the matchmaking
                      pattern shown in full in ../react/Matchmaking.jsx.

  Open this same file in two browser tabs, pick the same mode in both,
  and they will find each other.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PeerBasket demo</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; }
    button { padding: 8px 16px; margin-right: 8px; }
    #log { padding-left: 0; font-family: monospace; font-size: 14px; }
    #log li { list-style: none; padding: 2px 0; }
  </style>
</head>
<body>
  <h1>PeerBasket demo</h1>

  <p>My peer ID: <code id="my-id">connecting...</code></p>

  <button id="btn-lobby">Open lobby</button>
  <button id="btn-match">Find a match</button>

  <p>Status: <span id="status">pick a mode above to begin</span></p>

  <input id="message-input" type="text" placeholder="Type a message and press Enter" disabled />
  <ul id="log"></ul>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <script>
    const POLL_INTERVAL_MS = 10_000;

    // Each mode uses its own basket name so the two demos never mix
    // peers together even if you open both modes in different tabs.
    const BASKETS = {
      lobby: "peerbasket-demo-clickable-lobby",
      match: "peerbasket-demo-clickable-match",
    };

    const connections = new Map();
    let mode = null;       // "lobby" or "match", set when a button is clicked
    let pollTimer = null;

    const myIdEl = document.getElementById("my-id");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const messageInput = document.getElementById("message-input");

    function log(text) {
      const item = document.createElement("li");
      item.textContent = text;
      logEl.appendChild(item);
      logEl.scrollTop = logEl.scrollHeight;
    }

    const peer = new Peer();

    peer.on("open", (myId) => {
      myIdEl.textContent = myId;
    });

    peer.on("connection", (conn) => {
      // In "match" mode, reject anyone past the first connection.
      if (mode === "match" && connections.size >= 1) {
        conn.close();
        return;
      }
      setupConnection(conn);
    });

    peer.on("error", (err) => log(`PeerJS error: ${err.type}`));

    document.getElementById("btn-lobby").addEventListener("click", () => startMode("lobby"));
    document.getElementById("btn-match").addEventListener("click", () => startMode("match"));

    function startMode(chosenMode) {
      if (mode) return; // a mode is already running; reload the page to switch
      mode = chosenMode;
      messageInput.disabled = false;
      statusEl.textContent = mode === "lobby" ? "looking for everyone in the lobby..." : "looking for a match...";

      pollBasket();
      pollTimer = setInterval(pollBasket, POLL_INTERVAL_MS);
    }

    async function pollBasket() {
      // Once matched in "match" mode, stop polling entirely. No need
      // to keep spending requests once we've found our one peer.
      if (mode === "match" && connections.size >= 1) {
        clearInterval(pollTimer);
        return;
      }

      let response;
      try {
        response = await fetch(`https://peerbasket.bittu.dev/basket/${BASKETS[mode]}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ peer_id: peer.id }),
        });
      } catch {
        log("Could not reach PeerBasket, retrying...");
        return;
      }
      if (!response.ok) {
        log(`PeerBasket responded with HTTP ${response.status}`);
        return;
      }

      const { peers } = await response.json();
      const candidates = peers.filter((id) => id !== peer.id && !connections.has(id));

      if (mode === "lobby") {
        candidates.forEach((id) => setupConnection(peer.connect(id)));
      } else {
        // match mode: connect to at most one peer
        if (candidates.length > 0 && connections.size === 0) {
          setupConnection(peer.connect(candidates[0]));
        }
      }
    }

    function setupConnection(conn) {
      connections.set(conn.peer, conn);

      conn.on("open", () => {
        statusEl.textContent = mode === "lobby"
          ? `connected to ${connections.size} peer(s)`
          : `matched with ${conn.peer}`;
        log(`Connected to ${conn.peer}`);
      });

      conn.on("data", (data) => log(`${conn.peer}: ${data}`));

      conn.on("close", () => {
        connections.delete(conn.peer);
        log(`${conn.peer} disconnected`);
        if (mode === "lobby") {
          statusEl.textContent = `connected to ${connections.size} peer(s)`;
        } else {
          statusEl.textContent = "match ended";
        }
      });
    }

    messageInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter" || !e.target.value.trim()) return;
      const text = e.target.value.trim();
      connections.forEach((conn) => {
        if (conn.open) conn.send(text);
      });
      log(`me: ${text}`);
      e.target.value = "";
    });
  </script>
</body>
</html>
