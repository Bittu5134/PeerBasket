name: Deploy Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false 

      - name: Download Dependencies
        run: go mod download

      - name: Build Linux Binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" -o server .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

        - name: Upload Binary & Restart Service
        run: |
          # 1. Stop the active process to release the kernel lock entirely
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "systemctl stop peerbasket"
          
          # 2. Upload the new binary file cleanly now that the lock is gone
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./server \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/peerbasket/server

          # 3. Mark it executable and bring the service right back online
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            chmod +x /opt/peerbasket/server
            systemctl start peerbasket
            systemctl status peerbasket --no-pager
          EOF

      - name: Restart Service
        run: |
          # Since SERVER_USER is now root, these systemctl commands will execute flawlessly
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            chmod +x /opt/peerbasket/server
            systemctl restart peerbasket
            systemctl status peerbasket --no-pager
          EOF