name: Deploy Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Change this from "1.25" to "1.26" to align with your toolchain cache
          go-version: "1.26"
          # Optional: Disabling cache here will fix any remaining corrupted states
          cache: false 

      - name: Download Dependencies
        run: go mod download

      - name: Build Linux Binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" -o server .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload Binary
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./server \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/peerbasket/server

      - name: Restart Service
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            chmod +x /opt/peerbasket/server
            systemctl restart peerbasket
            systemctl status peerbasket --no-pager
          EOF