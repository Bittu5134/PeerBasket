name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: peerbasket-linux-amd64
          - goos: windows
            goarch: amd64
            artifact_name: peerbasket-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            artifact_name: peerbasket-mac-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: peerbasket-mac-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download Dependencies
        run: go mod download

      - name: Compile Binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.artifact_name }} .
          sha256sum ${{ matrix.artifact_name }}

      - name: Temporary Save for Release Job
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  publish-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Compiled Binaries
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
          merge-multiple: true

      - name: Generate Release Tag Name
        id: tag_name
        run: |
          # Use the git tag if available, fallback to manual execution date if run manually
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=manual-build-$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_name.outputs.tag }}
          name: Release ${{ steps.tag_name.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ./binaries/peerbasket-linux-amd64
            ./binaries/peerbasket-windows-amd64.exe
            ./binaries/peerbasket-mac-amd64
            ./binaries/peerbasket-mac-arm64